#DOGMA 01.01.2024

UserParameter=physical.disk.discover,/usr/sbin/smartctl --scan | awk 'BEGIN{printf "{\"data\":["}; /sd[a-z]/ {printf c"{\"{#DISKNAME}\":\""$1"\"}";c=","}; END{print "]}"}'
UserParameter=physical.disk.heals[*],/usr/sbin/smartctl -H $1 | grep -Eio -m 1 'PASSED|FAIL'
UserParameter=physical.disk.iinfo[*],/usr/sbin/smartctl -i $1 | grep "$2" | cut -f2 -d: | tr -d " "
UserParameter=physical.disk.rawww[*],/usr/sbin/smartctl -A $1 | grep $2 | awk '{print $ 10+0}'
